name: CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Validate workflow YAML
        run: ruby -e "require 'yaml'; YAML.load_file('.github/workflows/juejin-checkin.yml')"

      - name: Validate script syntax
        run: node --check scripts/juejin-checkin.mjs
